name: Embeddings backfill

# Computes embeddings (and recomputes the related-orgs cache) for any
# opportunity row still missing one — see backend/src/db/backfill-embeddings.ts.
# Already incremental: the script only selects rows where `embedding IS
# NULL`, so re-running is cheap once the initial backlog is cleared — rows
# that already have an embedding are skipped, not recomputed. Rows edited
# through the app (admin approve/edit, scrapers) are re-embedded inline at
# write time (see reembedAndRecompute() in data-access.ts), and vip-scraper.yml
# / engage-pipeline.yml now both pass OPENAI_API_KEY so that inline re-embed
# actually succeeds in CI instead of silently no-oping. This workflow is a
# manual safety net only — for the model-migration backfill (see migration
# 0004) or any row whose inline embed call failed and was never retried —
# not a recurring job, since there's no ongoing backlog for it to clear in
# steady state.
on:
  workflow_dispatch: {} # ad-hoc full backfill

# Guards against a manual run being kicked off twice in quick succession.
# The backfill is a straightforward per-row SELECT-then-UPDATE with no
# shared mutable state beyond each row's own `embedding` column, so two
# runs overlapping just means some rows get (harmlessly) picked up twice,
# never a corrupted write. `cancel-in-progress: false` queues the second
# run instead of killing the first mid-backfill.
concurrency:
  group: embeddings-backfill
  cancel-in-progress: false

jobs:
  backfill-embeddings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run embeddings backfill
        run: npm run backfill:embeddings --workspace backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
