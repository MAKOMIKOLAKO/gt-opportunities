name: Embeddings backfill

# Computes embeddings (and recomputes the related-orgs cache) for any
# opportunity row still missing one — see backend/src/db/backfill-embeddings.ts.
# Already incremental: the script only selects rows where `embedding IS
# NULL`, so re-running is cheap once the initial backlog is cleared — rows
# that already have an embedding are skipped, not recomputed. Rows edited
# through the app (admin approve/edit, scrapers) are re-embedded inline at
# write time (see reembedAndRecompute() in data-access.ts), so this workflow
# exists to catch anything that landed WITHOUT going through that path —
# most commonly the very first backfill against pre-existing data, or any
# row whose embed call failed inline and was never retried.
on:
  workflow_dispatch: {} # ad-hoc full backfill
  schedule:
    - cron: "17 9 * * *" # nightly, ~4:17am ET / 5:17am EDT

# Two triggers can land close together (a manual run kicked off while the
# nightly cron is also due). Don't cancel an in-flight run — the backfill
# is a straightforward per-row SELECT-then-UPDATE with no shared mutable
# state beyond each row's own `embedding` column, so two runs overlapping
# just means some rows get (harmlessly) picked up twice, never a
# corrupted write. `cancel-in-progress: false` queues the second run
# instead of killing the first mid-backfill.
concurrency:
  group: embeddings-backfill
  cancel-in-progress: false

jobs:
  backfill-embeddings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run embeddings backfill
        run: npm run backfill:embeddings --workspace backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
